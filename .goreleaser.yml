version: 2

project_name: aiswitch

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: aiswitch
    main: .
    binary: aiswitch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: aiswitch
    builds: [aiswitch]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  groups:
    - title: "✨ Features"
      regexp: "^.*feat[(\\[].*[)\\]]?:.*$"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^.*fix[(\\[].*[)\\]]?:.*$"
      order: 1
    - title: "📦 Dependencies"
      regexp: "^.*(deps|build)[(\\[].*[)\\]]?:.*$"
      order: 2
    - title: "🔧 Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: anmolnagpal
    name: aiswitch
  name_template: "⚡ aiswitch {{.Tag}}"
  draft: false
  prerelease: auto
  header: |
    ## 🎉 First release of aiswitch!

    **aiswitch** is a CLI tool for managing multiple AI provider accounts and switching between them instantly — like `tfswitch` for Terraform, but for AI.

    Switch between **Claude**, **OpenAI**, **Gemini**, and **GitHub Copilot** accounts with a single command. Works with **Cursor** and **Windsurf** IDEs out of the box. Supports per-project `.aiswitch` files that auto-switch profiles when you `cd` into a directory (like `.nvmrc` for Node).

    ### What's in this release
    - ✨ **4 AI providers** — Claude, OpenAI, Gemini, GitHub Copilot
    - 🖥️ **2 IDEs** — Cursor and Windsurf (patches `settings.json` automatically)
    - 🐚 **4 shells** — zsh, bash, fish, PowerShell (one-command setup: `aiswitch setup`)
    - 📁 **Per-project pinning** — `.aiswitch` file auto-switches on `cd`
    - 🔒 **Secrets separated** — API keys in `~/.aiswitch/secrets.json` (0600), never leaked to config
    - 🧹 **Clean handoff** — stale env blocks cleared on every switch
    - 🖥️ **5 platforms** — macOS arm64/amd64, Linux arm64/amd64, Windows amd64

  footer: |
    ---

    ## 🚀 Quick install

    ```bash
    # Option 1 — go install (requires Go 1.22+)
    go install github.com/anmolnagpal/aiswitch@latest

    # Option 2 — pre-built binary (macOS Apple Silicon)
    curl -L https://github.com/anmolnagpal/aiswitch/releases/download/{{.Tag}}/aiswitch_{{.Version}}_darwin_arm64.tar.gz | tar xz
    sudo mv aiswitch /usr/local/bin/

    # macOS Intel
    curl -L https://github.com/anmolnagpal/aiswitch/releases/download/{{.Tag}}/aiswitch_{{.Version}}_darwin_amd64.tar.gz | tar xz
    sudo mv aiswitch /usr/local/bin/

    # Linux amd64
    curl -L https://github.com/anmolnagpal/aiswitch/releases/download/{{.Tag}}/aiswitch_{{.Version}}_linux_amd64.tar.gz | tar xz
    sudo mv aiswitch /usr/local/bin/
    ```

    Windows — download the `.zip` for your architecture, extract `aiswitch.exe`, and add it to your `PATH`.

    ## ⚡ 30-second setup

    ```bash
    aiswitch setup          # install shell integration (zsh/bash/fish/PowerShell)
    source ~/.zshrc         # activate without restarting your terminal
    aiswitch add            # add your first profile (interactive form)
    aiswitch use work       # switch!
    ```

    ## 🐚 Shell integration (manual)

    | Shell | Add this line |
    |---|---|
    | Bash / Zsh | `eval "$(aiswitch shell-init)"` |
    | Fish | `aiswitch shell-init --shell fish \| source` |
    | PowerShell | `Invoke-Expression (aiswitch shell-init --shell powershell \| Out-String)` |

    ---

    ⭐ If aiswitch is useful to you, consider giving the [repo](https://github.com/anmolnagpal/aiswitch) a star — it helps others discover it!
