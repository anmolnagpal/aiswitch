version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: github.com/anmolnagpal/aiswitch

issues:
  exclude-rules:
    # Test files can have unused function arguments.
    - path: "_test\\.go"
      linters: [unparam]
  max-issues-per-linter: 0
  max-same-issues: 0
