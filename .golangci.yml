version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - unconvert
    - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/anmolnagpal/aiswitch

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclusions:
    rules:
      - path: "_test\\.go"
        linters: [unparam, errcheck]
