run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert

linters-settings:
  goimports:
    local-prefixes: github.com/anmolnagpal/aiswitch

issues:
  exclude-rules:
    # Test files can have unused parameters.
    - path: "_test\\.go"
      linters: [unparam, errcheck]
  max-issues-per-linter: 0
  max-same-issues: 0
