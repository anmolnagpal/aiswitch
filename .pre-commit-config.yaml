# Pre-commit hook configuration for teams using the pre-commit framework.
# Install: pip install pre-commit  OR  brew install pre-commit
# Activate: pre-commit install
#
# If you prefer no external dependencies, use: make hooks
# This sets up the same checks via native git hooks in .githooks/.

repos:
  # ── General file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ── Go formatting ─────────────────────────────────────────────────────────
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
      - id: go-build

  # ── golangci-lint ─────────────────────────────────────────────────────────
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.8
    hooks:
      - id: golangci-lint
        args: ["--timeout=5m"]
